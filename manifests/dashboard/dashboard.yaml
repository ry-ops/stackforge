---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stackforge-dashboard
  namespace: stackforge
  labels:
    app: stackforge-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stackforge-dashboard
  template:
    metadata:
      labels:
        app: stackforge-dashboard
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: dashboard
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: dashboard
          configMap:
            name: stackforge-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: stackforge-dashboard
  namespace: stackforge
spec:
  type: NodePort
  selector:
    app: stackforge-dashboard
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
